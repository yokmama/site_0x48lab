name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  report-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: failure()
    permissions:
      issues: write
      actions: read
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            const prUrl = context.payload.pull_request?.html_url;
            const branch = context.payload.pull_request?.head?.ref ?? context.ref;
            const sha = context.payload.pull_request?.head?.sha ?? context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const failedJobs = jobsData.jobs.filter(j => j.conclusion === 'failure');

            const failedJobsSection = failedJobs.map(job => {
              const failedSteps = (job.steps ?? []).filter(s => s.conclusion === 'failure');
              const stepsText = failedSteps.length
                ? failedSteps.map(s => `  - Step **${s.name}** (step ${s.number})`).join('\n')
                : '  - *(no specific step identified)*';
              return `### :x: ${job.name}\n${stepsText}\n[View job logs](${job.html_url})`;
            }).join('\n\n');

            const title = `CI failure on PR #${prNumber}: ${branch}`;
            const body = [
              `## CI checks failed`,
              ``,
              `| Field | Value |`,
              `|---|---|`,
              `| PR | ${prUrl ? `[#${prNumber}](${prUrl})` : 'N/A'} |`,
              `| Branch | \`${branch}\` |`,
              `| Commit | \`${sha.slice(0, 7)}\` |`,
              `| Run | [View all logs](${runUrl}) |`,
              ``,
              `### Failed jobs`,
              ``,
              failedJobsSection || '_One or more required checks (**lint**, **typecheck**, **build**) failed._',
              ``,
              `Please fix the errors and push again.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure'],
            });
